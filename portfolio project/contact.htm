<html>

<head>
        <title>Contact Me</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function validateForm() {
            let name = document.forms["contactForm"]["name"].value.trim();
            let email = document.forms["contactForm"]["email"].value.trim();
            let phone = document.forms["contactForm"]["phone"].value.trim();
            let password = document.forms["contactForm"]["password"].value;
            let confirmPassword = document.forms["contactForm"]["confirmPassword"].value;
            let namePattern = /^[A-Za-z]+$/;
            let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let phonePattern = /^[0-9]+$/;

            if (name === "" || email === "" || phone === "" || password === "" || confirmPassword === "") {
                alert("All fields are required.");
                return false;
            }
            if (!name.match(namePattern)) {
                alert("Name must contain only uppercase and lowercase letters (A-Z, a-z).");
                return false;
            }
            if (!email.match(emailPattern)) {
                alert("Please enter a valid email address.");
                return false;
            }
            if (!phone.match(phonePattern)) {
                alert("Phone number must contain only numbers (0-9).");
                return false;
            }
            if (password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return false;
            }
            if (password !== confirmPassword) {
                alert("Passwords do not match.");
                return false;
            }
            alert("Form submitted successfully!");
            return true;
        }
    </script>
</head>
<body class="bg-light text-dark text-center">

    <header class="bg-primary py-3 text-white">
        <h1 class="m-0">Contact Me</h1>
    </header>

    <nav class="nav justify-content-center bg-white shadow-sm py-3">
        <a class="nav-link text-primary fw-bold" href="home.htm">Home</a>
        <a class="nav-link text-primary fw-bold" href="about.htm">About</a>
        <a class="nav-link text-primary fw-bold" href="gallery.htm">Gallery</a>
        <a class="nav-link text-primary fw-bold" href="contact.htm">Contact</a>
    </nav>

    <div class="container mt-4">
        <h2 class="text-primary mb-4">Contact Me</h2>
        <div class="card bg-white p-4 text-dark shadow-lg mx-auto" style="max-width: 600px;">
            <form name="contactForm" onsubmit="return validateForm()">
                <div class="mb-3">
                    <input type="text" class="form-control" name="name" placeholder="Your Name" required>
                </div>
                <div class="mb-3">
                    <input type="email" class="form-control" name="email" placeholder="Your Email" required>
                </div>
                <div class="mb-3">
                    <input type="tel" class="form-control" name="phone" placeholder="Your Phone Number" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" name="password" placeholder="Password" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" name="confirmPassword" placeholder="Confirm Password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Submit</button>
            </form>
        </div>
    </div>

    
</body>
</html>
